; ─────────────────────────────────────────────────────────────────────────────
; nlOpenRotator – ESP32 TV Rotator Controller
; PlatformIO project configuration
; ─────────────────────────────────────────────────────────────────────────────

[env:nodemcu-32s]
platform      = espressif32
board         = nodemcu-32s
framework     = arduino
monitor_speed = 115200
monitor_port  = COM8
upload_port   = COM8
upload_speed  = 115200
upload_resetmethod = no_reset
; Pin esptool to 4.5.1 — v4.9.0 has a reset-timing regression on CP210x boards
platform_packages = tool-esptoolpy @ ~1.40501.0
monitor_filters = esp32_exception_decoder, colorize

lib_deps =
    bblanchon/ArduinoJson @ ^6.21.5

build_flags =
    -DCORE_DEBUG_LEVEL=0
