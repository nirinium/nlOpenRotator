; ─────────────────────────────────────────────────────────────────────────────
; nlOpenRotator – ESP32 TV Rotator Controller
; PlatformIO project configuration
; ─────────────────────────────────────────────────────────────────────────────

[env:nodemcu-32s]
platform      = espressif32
board         = nodemcu-32s
framework     = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize

lib_deps =
    bblanchon/ArduinoJson @ ^6.21.5

build_flags =
    -DCORE_DEBUG_LEVEL=0
